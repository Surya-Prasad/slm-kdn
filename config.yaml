project:
  name: SLM-driven Micro-KDN for Edge Networking Environments

data:
  dataset_name: Smarneh/NIT
  output_dir: data/processed
  test_size: 0.15
  val_size: 0.15
  seed: 42

prompt:
  mode: intent_with_context  # intent_only | intent_with_context

rag:
  enabled: false
  corpus: train,rag_docs
  doc_dir: rag-doc
  index_path: results/rag_index.pkl
  include_train_in_rag: true
  include_val_in_rag: false
  include_test_in_rag: false
  include_rag_docs: true
  chunk_size: 2200
  chunk_overlap: 300
  top_k: 5
  max_features: 50000
  dense_weight: 0.65
  lexical_weight: 0.35
  rag_doc_boost: 0.15

training:
  base_model: meta-llama/Meta-Llama-3-8B
  max_seq_len: 512
  per_device_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 0.0002
  num_train_epochs: 3
  lora_r: 32
  lora_alpha: 64
  lora_dropout: 0.05
  output_dir: results/lora_adapter
  use_4bit: true
  bf16: true
  pad_to_multiple_of: 8

inference:
  batch_size: 32
  max_new_tokens: 64
  temperature: 0.0
  top_p: 1.0

evaluation:
  pred_file: results/predictions/predictions.jsonl
  output_metrics: results/metrics/eval_metrics.json
